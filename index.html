<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Global Market Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial,"Microsoft JhengHei";
background:#050b18;
color:white;
padding:30px;
}

h1{
font-size:42px;
margin-bottom:6px;
}

.subtitle{
color:#9ca3af;
margin-bottom:8px;
}

.date{
color:#fbbf24;
margin-bottom:25px;
}

.section{
margin-top:35px;
}

.section h2{
margin-bottom:16px;
color:#e5e7eb;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.card h3{
margin-top:0;
color:#60a5fa;
}

.item{
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.item:last-child{
border:none;
}

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
gap:20px;
}

.chart-card{
background:#111827;
padding:20px;
border-radius:14px;
}

canvas{
height:260px !important;
}

.brief{
margin-top:40px;
background:#111827;
padding:20px;
border-radius:14px;
line-height:1.8;
}

.brief h2{
color:#facc15;
}

</style>
</head>

<body>

<h1>AI 全球市場觀察站</h1>
<div class="subtitle">Bloomberg Style Market Terminal</div>
<div class="date" id="date">更新中...</div>


<div class="section">

<h2>市場總覽</h2>

<div class="grid">

<div class="card">
<h3>Crypto</h3>
<div class="item" id="btc"></div>
<div class="item" id="eth"></div>
</div>

<div class="card">
<h3>US Index</h3>
<div class="item" id="sp500"></div>
<div class="item" id="nasdaq"></div>
</div>

<div class="card">
<h3>Taiwan</h3>
<div class="item" id="taiex"></div>
<div class="item" id="tsmc"></div>
</div>

<div class="card">
<h3>Commodities</h3>
<div class="item" id="gold"></div>
<div class="item" id="oil"></div>
</div>

<div class="card">
<h3>Forex</h3>
<div class="item" id="usd"></div>
</div>

<div class="card">
<h3>US Tech</h3>
<div class="item" id="nvda"></div>
<div class="item" id="aapl"></div>
<div class="item" id="msft"></div>
</div>

<div class="card">
<h3>Taiwan Tech</h3>
<div class="item" id="mediatek"></div>
<div class="item" id="foxconn"></div>
</div>

<div class="card">
<h3>Futures</h3>
<div class="item" id="sp500f"></div>
<div class="item" id="nasdaqf"></div>
</div>

</div>
</div>



<div class="section">

<h2>市場圖表</h2>

<div class="chart-grid">

<div class="chart-card">
<h3>BTC 30日</h3>
<canvas id="btcChart"></canvas>
</div>

<div class="chart-card">
<h3>S&P500 30日</h3>
<canvas id="spChart"></canvas>
</div>

<div class="chart-card">
<h3>台積電 30日</h3>
<canvas id="tsmcChart"></canvas>
</div>

<div class="chart-card">
<h3>黃金 30日</h3>
<canvas id="goldChart"></canvas>
</div>

</div>

</div>



<div class="brief">

<h2>AI 市場摘要</h2>

<p>

本系統為 AI 自動市場監控儀表板。

整合：

全球股市  
加密貨幣  
原物料  
外匯  
期貨  

未來將加入：

AI 市場分析  
市場情緒  
財經新聞  
交易訊號  

</p>

</div>



<script>

function drawChart(id,labels,data,label){

new Chart(document.getElementById(id),{

type:"line",

data:{
labels:labels,
datasets:[{
label:label,
data:data,
borderWidth:2,
tension:0.3
}]
},

options:{
plugins:{
legend:{labels:{color:"white"}}
},

scales:{
x:{ticks:{color:"#cbd5e1"}},
y:{ticks:{color:"#cbd5e1"}}
}

}

})

}


fetch("data.json")

.then(r=>r.json())

.then(data=>{

document.getElementById("date").innerText="更新："+data.date

document.getElementById("btc").innerText="BTC : "+data.BTC
document.getElementById("eth").innerText="ETH : "+data.ETH

document.getElementById("sp500").innerText="S&P500 : "+data.SP500
document.getElementById("nasdaq").innerText="NASDAQ : "+data.NASDAQ

document.getElementById("taiex").innerText="TAIEX : "+data.TAIEX
document.getElementById("tsmc").innerText="TSMC : "+data.TSMC

document.getElementById("gold").innerText="Gold : "+data.GOLD
document.getElementById("oil").innerText="Oil : "+data.OIL

document.getElementById("usd").innerText="USDJPY : "+data.USDJPY

document.getElementById("nvda").innerText="NVDA : "+data.NVDA
document.getElementById("aapl").innerText="AAPL : "+data.AAPL
document.getElementById("msft").innerText="MSFT : "+data.MSFT

document.getElementById("mediatek").innerText="聯發科 : "+data.MEDIATEK
document.getElementById("foxconn").innerText="鴻海 : "+data.FOXCONN

document.getElementById("sp500f").innerText="SP500 Futures : "+data.SP500_F
document.getElementById("nasdaqf").innerText="NASDAQ Futures : "+data.NASDAQ_F


drawChart("btcChart",data.BTC_labels,data.BTC_history,"BTC")

drawChart("spChart",data.SP500_labels,data.SP500_history,"S&P500")

drawChart("tsmcChart",data.TSMC_labels,data.TSMC_history,"TSMC")

drawChart("goldChart",data.GOLD_labels,data.GOLD_history,"Gold")

})

</script>

</body>
</html>
