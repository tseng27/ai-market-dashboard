<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Global Market Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .date {
      color: #facc15;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
      color: #93c5fd;
    }

    .item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 18px;
    }

    .item:last-child {
      border-bottom: none;
    }

    .brief {
      margin-top: 40px;
      background: #111827;
      border-radius: 16px;
      padding: 25px;
      line-height: 1.8;
    }

    .brief h2 {
      margin-top: 0;
      color: #facc15;
    }
  </style>
</head>

<body>

  <h1>AI 全球市場觀察站</h1>
  <div class="subtitle">曾老師的 AI 全球市場監控儀表板</div>
  <div class="date" id="update-date">資料更新中...</div>

  <div class="grid">
    <div class="card">
      <h2>加密貨幣</h2>
      <div class="item" id="btc">BTC：讀取中...</div>
      <div class="item" id="eth">ETH：讀取中...</div>
    </div>

    <div class="card">
      <h2>美股指數</h2>
      <div class="item" id="sp500">S&P500：讀取中...</div>
      <div class="item" id="nasdaq">NASDAQ：讀取中...</div>
    </div>

    <div class="card">
      <h2>台灣市場</h2>
      <div class="item" id="taiex">TAIEX：讀取中...</div>
    </div>

    <div class="card">
      <h2>原物料</h2>
      <div class="item" id="gold">Gold：讀取中...</div>
      <div class="item" id="oil">Oil：讀取中...</div>
    </div>

    <div class="card">
      <h2>外匯</h2>
      <div class="item" id="usdjpy">USDJPY：讀取中...</div>
    </div>
  </div>

  <div class="brief">
    <h2>AI 每日市場摘要</h2>
    <p>
      目前先完成「自動市場數據」版本。<br>
      下一步再升級成：新聞 + AI 摘要 + 市場判讀。
    </p>
  </div>

  <script>
    fetch("data.json")
      .then(response => response.json())
      .then(data => {
        document.getElementById("update-date").innerText = "最新更新：" + data.date;
        document.getElementById("btc").innerText = "BTC：" + data.BTC;
        document.getElementById("eth").innerText = "ETH：" + data.ETH;
        document.getElementById("sp500").innerText = "S&P500：" + data.SP500;
        document.getElementById("nasdaq").innerText = "NASDAQ：" + data.NASDAQ;
        document.getElementById("taiex").innerText = "TAIEX：" + data.TAIEX;
        document.getElementById("gold").innerText = "Gold：" + data.GOLD;
        document.getElementById("oil").innerText = "Oil：" + data.OIL;
        document.getElementById("usdjpy").innerText = "USDJPY：" + data.USDJPY;
      })
      .catch(error => {
        document.getElementById("update-date").innerText = "資料讀取失敗";
        console.error(error);
      });
  </script>

</body>
</html>
