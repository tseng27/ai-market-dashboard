<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI Global Market Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#050b18;
color:white;
padding:30px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
font-size:40px;
margin-bottom:6px;
}

.subtitle{
color:#9ca3af;
margin-bottom:30px;
}

.section{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#111827;
border-radius:12px;
padding:20px;
}

.card h3{
color:#60a5fa;
margin-bottom:15px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.value{
font-weight:bold;
}

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
}

.tv-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
gap:20px;
}

.news{
background:#111827;
padding:20px;
border-radius:12px;
}

.news-item{
margin-bottom:10px;
}

.heatmap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.heat{
padding:16px;
border-radius:10px;
}

canvas{
height:260px !important;
}

</style>

</head>


<body>

<div class="container">

<h1>AI Global Market Intelligence</h1>
<div class="subtitle">Professional Market Dashboard</div>



<div class="section">

<div class="grid">

<div class="card">
<h3>Crypto</h3>
<div class="item"><span>BTC</span><span id="btc" class="value"></span></div>
<div class="item"><span>ETH</span><span id="eth" class="value"></span></div>
</div>

<div class="card">
<h3>US Index</h3>
<div class="item"><span>S&P500</span><span id="sp500" class="value"></span></div>
<div class="item"><span>NASDAQ</span><span id="nasdaq" class="value"></span></div>
<div class="item"><span>Dow</span><span id="dow" class="value"></span></div>
</div>

<div class="card">
<h3>Taiwan</h3>
<div class="item"><span>TAIEX</span><span id="taiex"></span></div>
<div class="item"><span>TSMC</span><span id="tsmc"></span></div>
</div>

<div class="card">
<h3>Commodities</h3>
<div class="item"><span>Gold</span><span id="gold"></span></div>
<div class="item"><span>Oil</span><span id="oil"></span></div>
</div>

<div class="card">
<h3>Forex</h3>
<div class="item"><span>USDJPY</span><span id="usd"></span></div>
</div>

</div>
</div>


<div class="section">

<h2>Market Heatmap</h2>

<div id="heatmap" class="heatmap"></div>

</div>



<div class="section">

<h2>30 Day Market Trends</h2>

<div class="chart-grid">

<div class="card">
<h3>BTC</h3>
<canvas id="btcChart"></canvas>
</div>

<div class="card">
<h3>S&P500</h3>
<canvas id="spChart"></canvas>
</div>

<div class="card">
<h3>TSMC</h3>
<canvas id="tsmcChart"></canvas>
</div>

<div class="card">
<h3>Gold</h3>
<canvas id="goldChart"></canvas>
</div>

</div>

</div>



<div class="section">

<h2>Technical Charts</h2>

<div class="tv-grid">


<div class="card">

<h3>S&P500</h3>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
{
"symbol":"OANDA:SPX500USD",
"width":"100%",
"height":"260",
"locale":"zh_TW",
"dateRange":"1M",
"colorTheme":"dark"
}
</script>

</div>


<div class="card">

<h3>NASDAQ</h3>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
{
"symbol":"CAPITALCOM:US100",
"width":"100%",
"height":"260",
"locale":"zh_TW",
"dateRange":"1M",
"colorTheme":"dark"
}
</script>

</div>



<div class="card">

<h3>Dow Jones</h3>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
{
"symbol":"CAPITALCOM:US30",
"width":"100%",
"height":"260",
"locale":"zh_TW",
"dateRange":"1M",
"colorTheme":"dark"
}
</script>

</div>



<div class="card">

<h3>BTC</h3>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
{
"symbol":"BINANCE:BTCUSDT",
"width":"100%",
"height":"260",
"locale":"zh_TW",
"dateRange":"1M",
"colorTheme":"dark"
}
</script>

</div>



<div class="card">

<h3>Gold</h3>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
{
"symbol":"TVC:GOLD",
"width":"100%",
"height":"260",
"locale":"zh_TW",
"dateRange":"1M",
"colorTheme":"dark"
}
</script>

</div>

</div>

</div>



<div class="section">

<h2>Market News</h2>

<div class="news" id="news"></div>

</div>



</div>



<script>

function num(x){
if(!x)return "N/A"
return Number(x).toLocaleString()
}


fetch("data.json")

.then(r=>r.json())

.then(data=>{

document.getElementById("btc").textContent=num(data.BTC)
document.getElementById("eth").textContent=num(data.ETH)

document.getElementById("sp500").textContent=num(data.SP500)
document.getElementById("nasdaq").textContent=num(data.NASDAQ)
document.getElementById("dow").textContent=num(data.DOW)

document.getElementById("taiex").textContent=num(data.TAIEX)
document.getElementById("tsmc").textContent=num(data.TSMC)

document.getElementById("gold").textContent=num(data.GOLD)
document.getElementById("oil").textContent=num(data.OIL)

document.getElementById("usd").textContent=num(data.USDJPY)

drawChart("btcChart",data.BTC_labels,data.BTC_history)
drawChart("spChart",data.SP500_labels,data.SP500_history)
drawChart("tsmcChart",data.TSMC_labels,data.TSMC_history)
drawChart("goldChart",data.GOLD_labels,data.GOLD_history)

heatmap(data)

})


function drawChart(id,labels,data){

if(!data)return

new Chart(document.getElementById(id),{

type:"line",

data:{
labels:labels,
datasets:[{
data:data,
borderWidth:2,
tension:0.3
}]
}

})

}



function heatmap(data){

const list=[

["BTC",data.BTC,data.BTC_history],
["S&P500",data.SP500,data.SP500_history],
["TSMC",data.TSMC,data.TSMC_history],
["Gold",data.GOLD,data.GOLD_history]

]

const h=document.getElementById("heatmap")

list.forEach(i=>{

let change=0

if(i[2]&&i[2].length>1)
change=(i[2].slice(-1)[0]-i[2][0])/i[2][0]*100

const box=document.createElement("div")

box.className="heat"

box.style.background=change>0?"#064e3b":"#7f1d1d"

box.innerHTML=`<b>${i[0]}</b><br>${num(i[1])}<br>${change.toFixed(2)}%`

h.appendChild(box)

})

}



const news=[

"Fed policy outlook moves global markets",

"AI stocks continue leading US tech rally",

"Gold demand rises amid geopolitical risk",

"Bitcoin volatility returns to crypto market"

]

const newsBox=document.getElementById("news")

news.forEach(n=>{

const div=document.createElement("div")

div.className="news-item"

div.textContent=n

newsBox.appendChild(div)

})

</script>

</body>
</html>
