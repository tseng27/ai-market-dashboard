<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  background:#050b18;
  color:white;
  padding:30px;
}
.container{
  max-width:1600px;
  margin:auto;
}
h1{
  font-size:40px;
  margin-bottom:6px;
}
.subtitle{
  color:#9ca3af;
  margin-bottom:28px;
}
.section{
  margin-top:38px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}
.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
}
.card h3{
  color:#60a5fa;
  margin-bottom:12px;
}
.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.item:last-child{
  border-bottom:none;
}
.chart-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}
canvas{
  height:250px !important;
}
.tv-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:20px;
}
.tv-card{
  background:#111827;
  padding:20px;
  border-radius:12px;
}
.tv-card h3{
  color:#60a5fa;
  margin-bottom:12px;
}
</style>
</head>

<body>
<div class="container">

<h1>AI Market Terminal</h1>
<div class="subtitle">AI 全球金融市場觀察平台</div>

<div class="section">
  <div class="grid">

    <div class="card">
      <h3>加密貨幣</h3>
      <div class="item"><span>BTC</span><span id="btc"></span></div>
      <div class="item"><span>ETH</span><span id="eth"></span></div>
    </div>

    <div class="card">
      <h3>美國指數</h3>
      <div class="item"><span>S&P500</span><span id="sp500"></span></div>
      <div class="item"><span>NASDAQ</span><span id="nasdaq"></span></div>
      <div class="item"><span>Dow</span><span id="dow"></span></div>
    </div>

    <div class="card">
      <h3>台灣市場</h3>
      <div class="item"><span>TAIEX</span><span id="taiex"></span></div>
      <div class="item"><span>台積電</span><span id="tsmc"></span></div>
    </div>

    <div class="card">
      <h3>原物料</h3>
      <div class="item"><span>黃金</span><span id="gold"></span></div>
      <div class="item"><span>石油</span><span id="oil"></span></div>
    </div>

    <div class="card">
      <h3>外匯</h3>
      <div class="item"><span>USDJPY</span><span id="usdjpy"></span></div>
    </div>

  </div>
</div>

<div class="section">
  <h2>ETF市場</h2>
  <div class="grid">

    <div class="card">
      <h3>美國 ETF</h3>
      <div class="item"><span>SPY</span><span id="spy"></span></div>
      <div class="item"><span>QQQ</span><span id="qqq"></span></div>
      <div class="item"><span>DIA</span><span id="dia"></span></div>
    </div>

    <div class="card">
      <h3>台灣 ETF</h3>
      <div class="item"><span>0050</span><span id="etf0050"></span></div>
      <div class="item"><span>00878</span><span id="etf00878"></span></div>
    </div>

  </div>
</div>

<div class="section">
  <h2>市場趨勢</h2>
  <div class="chart-grid">

    <div class="card">
      <h3>BTC</h3>
      <canvas id="btcChart"></canvas>
    </div>

    <div class="card">
      <h3>S&P500</h3>
      <canvas id="spChart"></canvas>
    </div>

    <div class="card">
      <h3>TSMC</h3>
      <canvas id="tsmcChart"></canvas>
    </div>

    <div class="card">
      <h3>Gold</h3>
      <canvas id="goldChart"></canvas>
    </div>

  </div>
</div>

<div class="section">
  <h2>TradingView 技術圖表</h2>

  <div class="tv-grid">

    <div class="tv-card">
      <h3>S&P500</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"OANDA:SPX500USD",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

    <div class="tv-card">
      <h3>NASDAQ</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"CAPITALCOM:US100",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

    <div class="tv-card">
      <h3>Dow Jones</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"CAPITALCOM:US30",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

    <div class="tv-card">
      <h3>BTC / USD</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"BINANCE:BTCUSDT",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

    <div class="tv-card">
      <h3>SPY</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"AMEX:SPY",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

    <div class="tv-card">
      <h3>QQQ</h3>
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
      {
        "symbol":"NASDAQ:QQQ",
        "width":"100%",
        "height":"260",
        "locale":"zh_TW",
        "dateRange":"1M",
        "colorTheme":"dark"
      }
      </script>
    </div>

  </div>
</div>

</div>

  <h2 style="margin-top:50px;">AI 投資新聞</h2>

<div id="news" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;"></div>
<script>
function num(x){
  if(x===undefined || x===null) return "N/A";
  return Number(x).toLocaleString();
}

fetch("data.json")
.then(r => r.json())
.then(data => {

  document.getElementById("btc").textContent = num(data.BTC);
  document.getElementById("eth").textContent = num(data.ETH);

  document.getElementById("sp500").textContent = num(data.SP500);
  document.getElementById("nasdaq").textContent = num(data.NASDAQ);
  document.getElementById("dow").textContent = num(data.DOW);

  document.getElementById("taiex").textContent = num(data.TAIEX);
  document.getElementById("tsmc").textContent = num(data.TSMC);

  document.getElementById("gold").textContent = num(data.GOLD);
  document.getElementById("oil").textContent = num(data.OIL);

  document.getElementById("usdjpy").textContent = num(data.USDJPY);

  document.getElementById("spy").textContent = num(data.SPY);
  document.getElementById("qqq").textContent = num(data.QQQ);
  document.getElementById("dia").textContent = num(data.DIA);

  document.getElementById("etf0050").textContent = num(data.ETF0050);
  document.getElementById("etf00878").textContent = num(data.ETF00878);

  drawChart("btcChart", data.BTC_labels, data.BTC_history);
  drawChart("spChart", data.SP500_labels, data.SP500_history);
  drawChart("tsmcChart", data.TSMC_labels, data.TSMC_history);
  drawChart("goldChart", data.GOLD_labels, data.GOLD_history);
});

function drawChart(id, labels, data){
  if(!data || data.length === 0) return;

  new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "價格",
        data: data,
        borderWidth: 2,
        tension: 0.3
      }]
    }
  });
}
fetch("news.json")
.then(r => r.json())
.then(data => {

let html = "";

data.forEach(n => {

html += `
<div class="card">

<div style="font-size:15px;margin-bottom:6px;">
${n.title}
</div>

<div style="font-size:12px;color:#9ca3af;">
來源：${n.source}
</div>

<a href="${n.link}" target="_blank" style="color:#60a5fa;font-size:12px;">
閱讀全文 →
</a>

</div>
`;

});

document.getElementById("news").innerHTML = html;

});
</script>

</body>
</html>
