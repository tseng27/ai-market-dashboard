name: Update Market Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 升級到 v4 解決警告
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5  # 升級到 v5 解決警告
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests feedparser  # 在這裡補上了 feedparser

      - name: Run scripts
        run: |
          python fetch_data.py
          python news_fetch.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json news.json
          git commit -m "Auto update market data and news" || echo "No changes"
          git push
